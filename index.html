<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EM385Templates.com - USACE AHA Generator</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        h1 { color: #1a365d; text-align: center; }
        h2 { color: #666; text-align: center; font-size: 14px; margin-bottom: 20px; }
        
        .form-section { background: #f8fafc; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 6px; margin-bottom: 15px; }
        
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .btn { background: #ed8936; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 5px; }
        .btn-green { background: #38a169; }
        
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th { background: #1a365d; color: white; padding: 12px; text-align: left; }
        td { border: 1px solid #ccc; padding: 10px; }
        
        .rac-L { background: #38a169; color: white; padding: 4px 10px; border-radius: 4px; font-weight: bold; }
        
        .division-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        .division-btn { padding: 15px; border: 2px solid #ddd; border-radius: 8px; background: white; cursor: pointer; text-align: left; }
        .division-btn:hover { border-color: #ed8936; background: #fff8f0; }
        .division-btn.active { border-color: #ed8936; background: #ed8936; color: white; }
        .division-btn .num { font-size: 24px; font-weight: bold; }
        .division-btn .name { font-size: 11px; }
        
        .footer { text-align: center; margin-top: 30px; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ACTIVITY HAZARD ANALYSIS (AHA)</h1>
        <h2>ENG FORM 6206 | EM 385-1-1 Compliant</h2>
        
        <div class="form-section">
            <h3>Select CSI Division (Gadzoom Format)</h3>
            <div class="division-grid">
                <button class="division-btn" onclick="selectDivision('01','General Requirements')"><span class="num">01</span><br><span class="name">General Requirements</span></button>
                <button class="division-btn" onclick="selectDivision('02','Existing Conditions')"><span class="num">02</span><br><span class="name">Existing Conditions</span></button>
                <button class="division-btn" onclick="selectDivision('03','Concrete')"><span class="num">03</span><br><span class="name">Concrete</span></button>
                <button class="division-btn" onclick="selectDivision('04','Masonry')"><span class="num">04</span><br><span class="name">Masonry</span></button>
                <button class="division-btn" onclick="selectDivision('05','Metals')"><span class="num">05</span><br><span class="name">Metals</span></button>
                <button class="division-btn" onclick="selectDivision('06','Wood')"><span class="num">06</span><br><span class="name">Wood, Plastics, Composites</span></button>
                <button class="division-btn" onclick="selectDivision('07','Thermal')"><span class="num">07</span><br><span class="name">Thermal & Moisture</span></button>
                <button class="division-btn" onclick="selectDivision('08','Openings')"><span class="num">08</span><br><span class="name">Openings</span></button>
                <button class="division-btn" onclick="selectDivision('09','Finishes')"><span class="num">09</span><br><span class="name">Finishes</span></button>
                <button class="division-btn" onclick="selectDivision('10','Specialties')"><span class="num">10</span><br><span class="name">Specialties</span></button>
                <button class="division-btn" onclick="selectDivision('11','Equipment')"><span class="num">11</span><br><span class="name">Equipment</span></button>
                <button class="division-btn" onclick="selectDivision('12','Furnishings')"><span class="num">12</span><br><span class="name">Furnishings</span></button>
                <button class="division-btn" onclick="selectDivision('21','Fire Suppression')"><span class="num">21</span><br><span class="name">Fire Suppression</span></button>
                <button class="division-btn" onclick="selectDivision('22','Plumbing')"><span class="num">22</span><br><span class="name">Plumbing</span></button>
                <button class="division-btn" onclick="selectDivision('23','HVAC')"><span class="num">23</span><br><span class="name">HVAC</span></button>
                <button class="division-btn" onclick="selectDivision('26','Electrical')"><span class="num">26</span><br><span class="name">Electrical</span></button>
                <button class="division-btn" onclick="selectDivision('31','Earthwork')"><span class="num">31</span><br><span class="name">Earthwork</span></button>
                <button class="division-btn" onclick="selectDivision('33','Utilities')"><span class="num">33</span><br><span class="name">Utilities</span></button>
                <button class="division-btn" onclick="selectDivision('SPECIAL','Operations')"><span class="num">SPECIAL</span><br><span class="name">Operations</span></button>
                <button class="division-btn" onclick="selectDivision('EQUIP','Equipment')"><span class="num">EQUIP</span><br><span class="name">Construction Equipment</span></button>
            </div>
        </div>
        
        <div class="form-section">
            <div class="row">
                <div><label>Selected Division</label><input type="text" id="division" readonly></div>
                <div><label>Contract Number</label><input type="text" id="contractNum" placeholder="W912DX-26-C-XXXX"></div>
            </div>
            <div class="row">
                <div><label>Project Name</label><input type="text" id="projectName" placeholder="Project Name"></div>
                <div><label>Location</label><input type="text" id="projectLocation" placeholder="City, State"></div>
            </div>
            <div class="row">
                <div><label>Contractor</label><input type="text" id="contractorName"></div>
                <div><label>Phone</label><input type="text" id="contractorPhone"></div>
            </div>
            <div class="row">
                <div><label>Prepared By</label><input type="text" id="preparedBy"></div>
                <div><label>Date</label><input type="text" id="preparedDate"></div>
            </div>
        </div>
        
        <h3>AHA Steps for Selected Division</h3>
        <table>
            <thead><tr><th>Step#</th><th>Work Step</th><th>Hazards</th><th>Controls</th><th>RAC</th></tr></thead>
            <tbody id="ahaTable"><tr><td colspan="5" style="text-align:center">Select a division above</td></tr></tbody>
        </table>
        
        <div style="text-align:center;margin:20px 0;">
            <button class="btn" onclick="downloadPDF()">📥 Download PDF</button>
        </div>
        
        <div class="footer">EM385Templates.com | ENG Form 6206</div>
    </div>
    
    <script>
        const divisionData = {
            '01': {name:'General Requirements',steps:[
                {s:'1',w:'Mobilize to site',h:'Struck-by, slips',c:'PPE, housekeeping',r:'L'},
                {s:'2',w:'Install temporary facilities',h:'Electrical, falls',c:'GFCI, guardrails',r:'L'},
                {s:'3',w:'Provide safety orientation',h:'All hazards',c:'Site safety plan review',r:'L'}
            ]},
            '02': {name:'Existing Conditions',steps:[
                {s:'1',w:'Survey existing conditions',h:'Structural, environmental',c:'Competent person, PPE',r:'L'},
                {s:'2',w:'Document hazards',h:'Asbestos, lead, utilities',c:'Survey, clearance',r:'L'},
                {s:'3',w:'Protect existing structures',h:'Structural damage',c:' shoring, barriers',r:'L'}
            ]},
            '03': {name:'Concrete',steps:[
                {s:'1',w:'Formwork setup',h:'Falls, crushing',c:'Proper installation, PPE',r:'L'},
                {s:'2',w:'Rebar installation',h:'Lacerations, falls',c:'Gloves, harness',r:'L'},
                {s:'3',w:'Concrete pour',h:'Falls, struck-by',c:'Guardrails, PPE',r:'L'},
                {s:'4',w:'Cure concrete',h:'Slip hazards',c:'Non-slip surface',r:'L'}
            ]},
            '05': {name:'Metals',steps:[
                {s:'1',w:'Steel erection',h:'Falls, struck-by',c:'Safety harness, crane inspection',r:'L'},
                {s:'2',w:'Welding/cutting',h:'Fire, burns',c:'Fire watch, PPE',r:'L'},
                {s:'3',w:'Structural steel connection',h:'Falls',c:'PFAS, guardrails',r:'L'}
            ]},
            '21': {name:'Fire Suppression',steps:[
                {s:'1',w:'Install fire suppression piping',h:'Falls, burns',c:'PPE, proper lifting',r:'L'},
                {s:'2',w:'Connect to water supply',h:'Flooding',c:'Valve control, PPE',r:'L'},
                {s:'3',w:'Test system',h:'Pressure release',c:'Pressure gauges, PPE',r:'L'}
            ]},
            '22': {name:'Plumbing',steps:[
                {s:'1',w:'Install piping',h:'Falls, cuts',c:'PPE, proper scaffolding',r:'L'},
                {s:'2',w:'Confined space entry',h:'Toxic atmosphere',c:'Air monitoring, attendant',r:'L'},
                {s:'3',w:'Pipe pressure test',h:'High pressure',c:'Relief valves, PPE',r:'L'}
            ]},
            '23': {name:'HVAC',steps:[
                {s:'1',w:'Install ductwork',h:'Falls, cuts',c:'PPE, aerial lift',r:'L'},
                {s:'2',w:'Refrigerant handling',h:'Toxic exposure',c:'EPA certification, PPE',r:'L'},
                {s:'3',w:'Electrical connections',h:'Electrocution',c:'Lockout/tagout',r:'L'}
            ]},
            '26': {name:'Electrical',steps:[
                {s:'1',w:'Install conduit',h:'Falls, struck-by',c:'PPE, scaffolding',r:'L'},
                {s:'2',w:'Pull wire',h:'Cuts, electrical',c:'Gloves, lockout',r:'L'},
                {s:'3',w:'Panel connection',h:'Electrocution',c:'Lockout/tagout, PPE',r:'L'},
                {s:'4',w:'Test systems',h:'Electrical shock',c:'Proper testing, PPE',r:'L'}
            ]},
            '31': {name:'Earthwork',steps:[
                {s:'1',w:'Clear and grub',h:'Struck-by equipment',c:'Spotters, PPE',r:'L'},
                {s:'2',w:'Excavation',h:'Cave-in',c:'Shoring, competent person',r:'L'},
                {s:'3',w:'Backfill/compaction',h:'Equipment rollover',c:'Ground stability, operators',r:'L'}
            ]},
            '33': {name:'Utilities',steps:[
                {s:'1',w:'Utility locate',h:'Striking utilities',c:'811 call, verification',r:'L'},
                {s:'2',w:'Excavation',h:'Cave-in, utility strike',c:'Proximity limits, PPE',r:'L'},
                {s:'3',w:'Pipe installation',h:'Falls, strikes',c:'Shoring, spotters',r:'L'},
                {s:'4',w:'Testing',h:'Pressure release',c:'Relief, PPE',r:'L'}
            ]},
            'SPECIAL': {name:'Operations',steps:[
                {s:'1',w:'Identify operation scope',h:'Various',c:'Site specific AHA',r:'L'},
                {s:'2',w:'Implement controls',h:'Operation specific',c:'Controls per AHA',r:'L'},
                {s:'3',w:'Monitor conditions',h:'Dynamic hazards',c:'Continuous monitoring',r:'L'}
            ]},
            'EQUIP': {name:'Construction Equipment',steps:[
                {s:'1',w:'Equipment mobilization',h:'Struck-by, pinch points',c:'Spotters, PPE',r:'L'},
                {s:'2',w:'Equipment operation',h:'Rollovers, struck-by',c:'ROPS, seat belts',r:'L'},
                {s:'3',w:'Refueling',h:'Fire, spills',c:'No smoking, spill kit',r:'L'},
                {s:'4',w:'Maintenance',h:'Pinch points, burns',c:'Lockout/tagout, PPE',r:'L'}
            ]}
        };
        
        function selectDivision(div, name) {
            document.getElementById('division').value = div + ' - ' + name;
            const data = divisionData[div];
            const tbody = document.getElementById('ahaTable');
            tbody.innerHTML = data.steps.map(s => 
                `<tr><td>${s.s}</td><td>${s.w}</td><td>${s.h}</td><td>${s.c}</td><td><span class="rac-L">${s.r}</span></td></tr>`
            ).join('');
        }
        
        async function downloadPDF() {
            const {PDFDocument, rgb, StandardFonts} = PDFLib;
            const pdf = await PDFDocument.create();
            const page = pdf.addPage([612,792]);
            const font = await pdf.embedFont(StandardFonts.TimesRoman);
            const fbold = await pdf.embedFont(StandardFonts.TimesRomanBold);
            
            page.drawText('ACTIVITY HAZARD ANALYSIS',{x:150,y:750,size:14,font:fbold});
            page.drawText('ENG FORM 6206',{x:230,y:730,size:10,font});
            page.drawText('Division: '+document.getElementById('division').value,{x:20,y:700,size:10});
            page.drawText('Contract: '+document.getElementById('contractNum').value,{x:350,y:700,size:10});
            
            const div = document.querySelector('.division-btn.active')?.onclick?.toString().match(/'(.*?)'/)?.[1];
            if(div && divisionData[div]){
                let y=660;
                divisionData[div].steps.forEach((s,i)=>{
                    page.drawRectangle({x:20,y:y-15,width:572,height:18,color:i%2?rgb(1,1,1):rgb(0.95,0.95,0.95)});
                    page.drawRectangle({x:540,y:y-15,width:52,height:18,color:rgb(0.22,0.63,0.41)});
                    page.drawText(s.s,{x:25,y:y,size:8});page.drawText(s.w,{x:60,y,size:8});
                    page.drawText(s.h,{x:200,y,size:8});page.drawText(s.c,{x:370,y,size:8});
                    page.drawText(s.r,{x:555,y,size:9,font:fbold,color:rgb(1,1,1)});
                    y-=20;
                });
            }
            page.drawText('EM385Templates.com',{x:220,y:30,size:8,font});
            const pdfBytes=await pdf.save();
            const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([pdfBytes],{type:'application/pdf'}));
            a.download='AHA.pdf';a.click();
        }
    </script>
</body>
</html>
